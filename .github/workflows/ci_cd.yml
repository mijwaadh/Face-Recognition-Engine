name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  # Job 1: Test, Build, and Deploy the Python Backend Docker Image
  backend:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Pytest Suite
        run: |
          python -m pytest

      # Build and push Docker image (only on push to main or tag releases)
      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata (Tags/Labels)
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/biometric-backend
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Continuous Deployment: SSH onto cloud instance and reload stack (only on push to main)
      - name: Deploy to Cloud Host via SSH
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.SSH_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myface
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  # Job 2: Build and Sign the Flutter Android APK
  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: Recreate Android Project files
        run: |
          cd myface_mobile
          flutter create --platforms=android --org com.antigravity .

      - name: Install Flutter Packages
        run: |
          cd myface_mobile
          flutter pub get

      - name: Run Flutter Analyzer & Tests
        run: |
          cd myface_mobile
          flutter analyze
          flutter test

      - name: Build Android Release APK
        run: |
          cd myface_mobile
          flutter build apk --release --build-number=${{ github.run_number }}

      # Upload generated APK as a pipeline artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: biometric-auth-release-apk
          path: myface_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # Create draft GitHub release with APK asset if a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: myface_mobile/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
