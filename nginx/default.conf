# Rate Limiting Zone: Restricts brute force logins to 1 request per second per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

# Server configuration
server {
    listen 80;
    server_name localhost;

    # Enforce global redirection from HTTP to HTTPS in production
    # In docker testing environments or when certs are absent, fallback to direct proxy
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    # SSL Certificate Path Mappings (Provided by Let's Encrypt / Certbot volume mounts)
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

    # Strong Cipher Suites config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Client upload limit (enables multi-snapshot enrollment payloads)
    client_max_body_size 25M;

    # Global Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;

    # Forward check to FastAPI Health Diagnostics (no rate limits)
    location /api/v1/health {
        proxy_pass http://web:8000/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Restrict authentication login attempts to prevent automated brute-force attacks
    location /api/v1/authenticate {
        limit_req zone=auth_limit burst=3 nodelay;
        
        proxy_pass http://web:8000/api/v1/authenticate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other general routes to Gunicorn backend
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable SSE or Visual streams buffering bypass
        proxy_buffering off;
        proxy_cache off;
    }
}
